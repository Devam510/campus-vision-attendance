version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: attendance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: password
      POSTGRES_DB: attendance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance"]
      interval: 10s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    restart: unless-stopped
    env_file: ./Backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://attendance:password@postgres:5432/attendance_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./Backend/models:/app/models
      - ./Backend/logs:/app/logs
      - ./Backend/credentials.json:/app/credentials.json
    ports:
      - "8000:8000"
    devices:
      - /dev/video0:/dev/video0  # Camera passthrough (Linux only)

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: attendance_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: attendance_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
